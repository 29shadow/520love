<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>520 ❤</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            width: 100vw;
            min-height: 100vh;
            overflow-x: hidden;
            overflow-y: auto;
            font-family: -apple-system, BlinkMacSystemFont, "PingFang SC", "Microsoft YaHei", sans-serif;
            background: linear-gradient(135deg, #0c0026 0%, #1a0033 25%, #2d0040 50%, #1a0033 75%, #0c0026 100%);
            background-attachment: fixed;
            background-size: 400% 400%;
            animation: bgShift 15s ease infinite;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            touch-action: manipulation;
            -webkit-tap-highlight-color: transparent;
            -webkit-user-select: none;
            user-select: none;
            padding: 40px 16px 80px;
        }

        @keyframes bgShift {
            0%, 100% { background-position: 0% 50%; }
            25% { background-position: 100% 0%; }
            50% { background-position: 100% 100%; }
            75% { background-position: 0% 100%; }
        }

        /* 星星背景 */
        .stars {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            pointer-events: none;
            z-index: 0;
        }

        .star {
            position: absolute;
            background: white;
            border-radius: 50%;
            animation: twinkle var(--duration) ease-in-out infinite;
            animation-delay: var(--delay);
            opacity: 0;
        }

        @keyframes twinkle {
            0%, 100% { opacity: 0.2; transform: scale(1); }
            50% { opacity: 1; transform: scale(1.5); }
        }

        /* Canvas 爱心层 */
        #heartCanvas {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            pointer-events: none;
            z-index: 1;
        }

        /* 主内容 */
        .main-content {
            position: relative;
            z-index: 10;
            text-align: center;
            padding: 20px 10px;
            width: 100%;
            max-width: 500px;
        }

        /* 大爱心 */
        .big-heart {
            font-size: min(30vw, 150px);
            animation: heartbeat 1.2s ease-in-out infinite;
            display: inline-block;
            cursor: pointer;
            filter: drop-shadow(0 0 30px rgba(255, 50, 100, 0.6));
            transition: transform 0.1s;
        }

        .big-heart:active {
            transform: scale(1.3);
        }

        @keyframes heartbeat {
            0%, 100% { transform: scale(1); }
            14% { transform: scale(1.15); }
            28% { transform: scale(1); }
            42% { transform: scale(1.15); }
            56% { transform: scale(1); }
        }

        /* 标题 */
        .title {
            color: #fff;
            font-size: min(8vw, 42px);
            font-weight: bold;
            margin-top: 20px;
            text-shadow: 0 0 20px rgba(255, 100, 150, 0.8), 0 0 40px rgba(255, 50, 100, 0.5);
            animation: titleGlow 2s ease-in-out infinite;
        }

        @keyframes titleGlow {
            0%, 100% { text-shadow: 0 0 20px rgba(255, 100, 150, 0.8), 0 0 40px rgba(255, 50, 100, 0.5); }
            50% { text-shadow: 0 0 30px rgba(255, 100, 150, 1), 0 0 60px rgba(255, 50, 100, 0.8), 0 0 80px rgba(255, 100, 150, 0.6); }
        }

        /* 副标题 */
        .subtitle {
            color: rgba(255, 200, 220, 0.9);
            font-size: min(4vw, 20px);
            margin-top: 12px;
            letter-spacing: 2px;
            animation: fadeInUp 1.5s ease-out;
        }

        @keyframes fadeInUp {
            from {
                opacity: 0;
                transform: translateY(30px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        /* 日期 */
        .date-text {
            color: rgba(255, 180, 200, 0.7);
            font-size: min(3.5vw, 16px);
            margin-top: 8px;
            letter-spacing: 3px;
            animation: fadeInUp 1.5s ease-out 0.3s both;
        }

        /* 打字机区域 */
        .typewriter-wrapper {
            position: relative;
            z-index: 10;
            margin-top: 24px;
            padding: 18px 14px;
            width: 100%;
            max-width: 500px;
            background: rgba(255, 255, 255, 0.05);
            border-radius: 16px;
            border: 1px solid rgba(255, 150, 180, 0.2);
            backdrop-filter: blur(10px);
            -webkit-backdrop-filter: blur(10px);
            animation: fadeInUp 1.5s ease-out 0.6s both;
        }

        .typewriter-text {
            color: #ffb8c9;
            font-size: 15px;
            line-height: 1.9;
            text-align: left;
            letter-spacing: 0.5px;
            min-height: 40px;
            word-break: break-word;
        }

        .typewriter-cursor {
            display: inline;
            color: #ff6b8a;
            font-weight: bold;
            animation: cursorBlink 0.8s step-end infinite;
        }

        @keyframes cursorBlink {
            0%, 100% { opacity: 1; }
            50% { opacity: 0; }
        }

        /* 点击提示 */
        .hint {
            position: fixed;
            bottom: 40px;
            left: 50%;
            transform: translateX(-50%);
            color: rgba(255, 255, 255, 0.6);
            font-size: 14px;
            z-index: 10;
            animation: bounce 2s ease-in-out infinite;
            pointer-events: none;
        }

        @keyframes bounce {
            0%, 100% { transform: translateX(-50%) translateY(0); }
            50% { transform: translateX(-50%) translateY(-10px); }
        }

        /* 响应式 - 手机端 */
        @media (max-width: 480px) {
            body {
                padding: 30px 12px 100px;
            }

            .title {
                font-size: 11vw;
            }

            .subtitle {
                font-size: 5.5vw;
            }

            .date-text {
                font-size: 4.5vw;
            }

            .typewriter-wrapper {
                padding: 16px 12px;
                margin-top: 20px;
                border-radius: 12px;
            }

            .typewriter-text {
                font-size: 14px;
                line-height: 1.8;
            }

            .big-heart {
                font-size: 35vw;
            }

            .hint {
                bottom: 30px;
                font-size: 12px;
            }
        }

        /* 响应式 - 小屏手机 */
        @media (max-width: 360px) {
            .typewriter-text {
                font-size: 13px;
                line-height: 1.7;
            }

            .title {
                font-size: 12vw;
            }

            .big-heart {
                font-size: 38vw;
            }
        }
    </style>
</head>
<body>
    <!-- 星星背景 -->
    <div class="stars" id="stars"></div>

    <!-- 爱心粒子画布 -->
    <canvas id="heartCanvas"></canvas>

    <!-- 主内容 -->
    <div class="main-content">
        <div class="big-heart" id="bigHeart">❤️</div>
        <h1 class="title">520 · 我爱你</h1>
        <p class="subtitle">愿世间所有美好，都与你环环相扣</p>
        <p class="date-text">2026.05.20</p>
    </div>

    <!-- 打字机文字 -->
    <div class="typewriter-wrapper">
        <p class="typewriter-text" id="typewriter"></p>
    </div>

    <!-- 点击提示 -->
    <div class="hint">👆 点击爱心有惊喜</div>

    <script>
        (function() {
            // ========== 星星背景 ==========
            const starsContainer = document.getElementById('stars');
            const starCount = 80;
            for (let i = 0; i < starCount; i++) {
                const star = document.createElement('div');
                star.className = 'star';
                const size = Math.random() * 3 + 1;
                star.style.width = size + 'px';
                star.style.height = size + 'px';
                star.style.left = Math.random() * 100 + '%';
                star.style.top = Math.random() * 100 + '%';
                star.style.setProperty('--duration', (Math.random() * 3 + 2) + 's');
                star.style.setProperty('--delay', (Math.random() * 5) + 's');
                starsContainer.appendChild(star);
            }

            // ========== Canvas 爱心粒子 ==========
            const canvas = document.getElementById('heartCanvas');
            const ctx = canvas.getContext('2d');
            let width, height;
            let particles = [];
            let floatingHearts = [];

            function resize() {
                width = canvas.width = window.innerWidth;
                height = canvas.height = window.innerHeight;
            }
            resize();
            window.addEventListener('resize', resize);

            // 爱心形状参数方程
            function heartX(t) {
                return 16 * Math.pow(Math.sin(t), 3);
            }

            function heartY(t) {
                return -(13 * Math.cos(t) - 5 * Math.cos(2 * t) - 2 * Math.cos(3 * t) - Math.cos(4 * t));
            }

            // 粒子类
            class Particle {
                constructor(x, y, color) {
                    this.x = x;
                    this.y = y;
                    this.vx = (Math.random() - 0.5) * 4;
                    this.vy = (Math.random() - 0.5) * 4 - 2;
                    this.color = color;
                    this.alpha = 1;
                    this.size = Math.random() * 4 + 2;
                    this.gravity = 0.05;
                    this.friction = 0.98;
                    this.life = 1;
                    this.decay = Math.random() * 0.02 + 0.008;
                }

                update() {
                    this.vy += this.gravity;
                    this.vx *= this.friction;
                    this.vy *= this.friction;
                    this.x += this.vx;
                    this.y += this.vy;
                    this.life -= this.decay;
                    this.alpha = this.life;
                }

                draw(ctx) {
                    ctx.save();
                    ctx.globalAlpha = this.alpha;
                    ctx.fillStyle = this.color;
                    ctx.shadowColor = this.color;
                    ctx.shadowBlur = 8;
                    ctx.beginPath();
                    ctx.arc(this.x, this.y, this.size, 0, Math.PI * 2);
                    ctx.fill();
                    ctx.restore();
                }
            }

            // 飘浮爱心类
            class FloatingHeart {
                constructor() {
                    this.reset();
                    this.y = Math.random() * height;
                }

                reset() {
                    this.x = Math.random() * width;
                    this.y = height + 50;
                    this.size = Math.random() * 20 + 10;
                    this.speed = Math.random() * 0.8 + 0.3;
                    this.wobble = Math.random() * Math.PI * 2;
                    this.wobbleSpeed = (Math.random() - 0.5) * 0.02;
                    this.alpha = Math.random() * 0.4 + 0.2;
                    this.color = `hsla(${Math.random() * 30 + 340}, 80%, ${Math.random() * 20 + 55}%, ${this.alpha})`;
                }

                update() {
                    this.y -= this.speed;
                    this.wobble += this.wobbleSpeed;
                    this.x += Math.sin(this.wobble) * 0.5;
                    if (this.y < -60) {
                        this.reset();
                    }
                }

                draw(ctx) {
                    const s = this.size / 20;
                    ctx.save();
                    ctx.globalAlpha = this.alpha;
                    ctx.fillStyle = this.color;
                    ctx.shadowColor = this.color;
                    ctx.shadowBlur = 10;
                    ctx.translate(this.x, this.y);
                    ctx.scale(s, s);
                    ctx.beginPath();
                    for (let t = 0; t < Math.PI * 2; t += 0.01) {
                        const hx = heartX(t);
                        const hy = heartY(t);
                        ctx.lineTo(hx, hy);
                    }
                    ctx.closePath();
                    ctx.fill();
                    ctx.restore();
                }
            }

            // 初始化飘浮爱心
            for (let i = 0; i < 25; i++) {
                const fh = new FloatingHeart();
                fh.y = Math.random() * height;
                floatingHearts.push(fh);
            }

            // 爆炸粒子效果
            function explode(x, y) {
                const colors = [
                    '#ff6b8a', '#ff3366', '#ff99bb', '#ff1744',
                    '#ff4081', '#f50057', '#ff80ab', '#ff5252',
                    '#ff8a80', '#ff4081', '#e91e63', '#ff6090'
                ];
                const count = 30;
                for (let i = 0; i < count; i++) {
                    const color = colors[Math.floor(Math.random() * colors.length)];
                    particles.push(new Particle(x, y, color));
                }
            }

            // 点击爱心
            const bigHeart = document.getElementById('bigHeart');
            bigHeart.addEventListener('click', function(e) {
                const rect = bigHeart.getBoundingClientRect();
                const cx = rect.left + rect.width / 2;
                const cy = rect.top + rect.height / 2;
                explode(cx, cy);

                // 爱心弹跳动画
                bigHeart.style.animation = 'none';
                bigHeart.offsetHeight;
                bigHeart.style.animation = 'heartbeat 1.2s ease-in-out infinite';
            });

            // 点击页面任意位置也产生爱心
            document.addEventListener('click', function(e) {
                if (e.target === bigHeart || bigHeart.contains(e.target)) return;
                explode(e.clientX, e.clientY);
            });

            // 触摸事件（移动端）
            document.addEventListener('touchstart', function(e) {
                if (e.target === bigHeart || bigHeart.contains(e.target)) return;
                const touch = e.touches[0];
                explode(touch.clientX, touch.clientY);
            }, { passive: true });

            // 动画循环
            function animate() {
                ctx.clearRect(0, 0, width, height);

                // 更新和绘制飘浮爱心
                floatingHearts.forEach(fh => {
                    fh.update();
                    fh.draw(ctx);
                });

                // 更新和绘制爆炸粒子
                for (let i = particles.length - 1; i >= 0; i--) {
                    particles[i].update();
                    particles[i].draw(ctx);
                    if (particles[i].life <= 0) {
                        particles.splice(i, 1);
                    }
                }

                requestAnimationFrame(animate);
            }

            animate();

            // ========== 微信分享配置 ==========
            // 设置页面标题，方便微信分享
            document.title = '520 ❤ 我爱你';

            // ========== 打字机效果 ==========
            const typewriterEl = document.getElementById('typewriter');
            const message = "Dear wife, thank you for your companionship, tolerance, and dedication all the way. You are the daily necessities of life, and you are also the gentle affection. For the rest of my life, three meals in four seasons, year after year, I will always love and cherish you well, happy holidays";

            let charIndex = 0;
            let cursorVisible = true;

            // 创建光标元素
            const cursor = document.createElement('span');
            cursor.className = 'typewriter-cursor';
            cursor.textContent = '|';
            typewriterEl.appendChild(cursor);

            function typeNextChar() {
                if (charIndex < message.length) {
                    // 在光标前插入字符
                    const textNode = document.createTextNode(message[charIndex]);
                    typewriterEl.insertBefore(textNode, cursor);
                    charIndex++;
                    // 随机打字速度，模拟真实打字
                    const delay = Math.random() * 60 + 30;
                    setTimeout(typeNextChar, delay);
                } else {
                    // 打字完成，光标继续闪烁
                    cursor.style.animation = 'cursorBlink 0.8s step-end infinite';
                }
            }

            // 页面加载后延迟1秒开始打字
            setTimeout(typeNextChar, 1000);

            console.log('💕 520快乐！愿世间所有美好都与你环环相扣 💕');
        })();
    </script>
</body>
</html>
